# CI Pipeline — hyrox-saas
#
# Fluxo completo:
#   test → deploy-staging → smoke-test → synthetic-test → deploy-canary → monitor-canary → deploy-production
#
# Onde ver o resultado:
#   GitHub → aba "Actions" do repositório

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm install
        working-directory: frontend

      - name: Rodar testes
        run: npm test
        working-directory: frontend

  deploy-staging:
    name: Deploy para Staging
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Acionar deploy no Render (staging)
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}"

  smoke-test:
    name: Smoke Test (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Aguardar Render finalizar o deploy
        run: sleep 30

      - name: Verificar se o staging está respondendo
        run: curl --fail --silent --max-time 15 https://hyrox-saas-staging.onrender.com

  synthetic-test:
    name: Synthetic Test (Staging)
    runs-on: ubuntu-latest
    needs: smoke-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Instalar dependências
        run: npm install
        working-directory: frontend

      - name: Instalar browsers do Playwright
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Rodar testes sintéticos no staging
        run: npx playwright test --config=playwright.config.js
        working-directory: frontend

      - name: Salvar screenshots e logs de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-debug
          path: frontend/test-results/

  deploy-canary:
    name: Deploy para Canary
    runs-on: ubuntu-latest
    needs: synthetic-test

    steps:
      - name: Acionar deploy no Render (canary)
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_CANARY }}"

  monitor-canary:
    name: Monitor Canary (60s)
    runs-on: ubuntu-latest
    needs: deploy-canary

    steps:
      - name: Aguardar Render finalizar o deploy canary
        run: sleep 30

      - name: Verificar canary a cada 10s por 60s
        run: |
          for i in 1 2 3 4 5 6; do
            echo "Verificação $i/6..."
            curl --fail --silent --max-time 10 https://hyrox-saas-canary.onrender.com
            echo " OK"
            sleep 10
          done

  deploy-production:
    name: Deploy para Produção
    runs-on: ubuntu-latest
    needs: monitor-canary

    steps:
      - name: Acionar deploy no Render (produção)
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}"
